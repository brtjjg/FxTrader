# render.yaml - For Render.com deployment

services:
  # Option A: Static Site (Recommended)
  - type: static
    name: fxtrader
    runtime: static
    buildCommand: echo "No build required"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Option B: Web Service (if you want a Node.js server)
